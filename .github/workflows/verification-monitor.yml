name: Monitor Live Verification

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor-live:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Verify deployed site and PDF
        env:
          MONITOR_OUTPUT_DIR: verification
        run: |
          ./scripts/monitor_verification.sh "${{ github.repository }}" presentation.yml | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload verification summary
        uses: actions/upload-artifact@v7.0.0
        with:
          name: live-verification-summary
          path: verification/
