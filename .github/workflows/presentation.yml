name: Build and Deploy Presentation

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare virtual environment
        run: ./scripts/setup_venv.sh

      - name: Prepare node dependencies
        run: ./scripts/setup_node.sh

      - name: Lint repository sources
        run: ./scripts/lint_repo.sh

  build:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements-docs.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Prepare virtual environment
        run: ./scripts/setup_venv.sh

      - name: Prepare node dependencies
        run: ./scripts/setup_node.sh

      - name: Run React test suite
        run: npm run test:run

      - name: Build Beamer PDF
        uses: xu-cheng/latex-action@4.0.0
        with:
          root_file: slides/blabla_agency_presentation.tex
          args: -lualatex -interaction=nonstopmode -halt-on-error -file-line-error -outdir=build

      - name: Build React site, Storybook, and staged artifacts
        run: |
          ./scripts/stage_site.sh
          ./scripts/verify_outputs.sh
          ./scripts/write_artifact_manifest.sh >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: blabla-agency-presentation-pdf
          path: build/blabla_agency_presentation.pdf

      - name: Upload site artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: blabla-agency-site
          path: site

      - name: Upload Storybook artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: blabla-agency-storybook
          path: storybook-static

      - name: Upload artifact manifest
        uses: actions/upload-artifact@v7.0.0
        with:
          name: blabla-agency-artifact-manifest
          path: artifacts/blabla-agency-artifact-manifest.md

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
