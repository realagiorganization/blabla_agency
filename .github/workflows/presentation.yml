name: Build and Deploy Presentation

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install documentation dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-docs.txt

      - name: Build Beamer PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: slides/blabla_agency_presentation.tex
          args: -lualatex -interaction=nonstopmode -halt-on-error -file-line-error -outdir=build

      - name: Build MkDocs site
        run: |
          mkdocs build --strict --site-dir site
          mkdir -p site/artifacts
          cp build/blabla_agency_presentation.pdf site/artifacts/blabla_agency_presentation.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: blabla-agency-presentation-pdf
          path: build/blabla_agency_presentation.pdf

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: blabla-agency-site
          path: site

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
